<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Oriupe — Messagerie</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/src/shared/styles/base.css"/>
<script src="/src/shared/oriupe-session.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;height:100%}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0F2535;color:#1B3A4A;height:100vh;display:flex;flex-direction:column;overflow:hidden}
a{text-decoration:none;color:inherit}
button,input,textarea{font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer}

/* ── APP SHELL ── */
.msg-app{display:flex;height:calc(100vh - 56px);overflow:hidden}

/* ── LEFT SIDEBAR ── */
.sidebar{
  width:300px;flex-shrink:0;
  background:#0F2535;
  display:flex;flex-direction:column;
  border-right:1px solid rgba(255,255,255,.06);
  height:100%;overflow:hidden;
  transition:transform .25s ease
}
.sb-top{
  padding:14px 16px;
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;gap:10px
}
.sb-back{
  width:28px;height:28px;border-radius:7px;
  border:1.5px solid rgba(255,255,255,.1);
  background:transparent;color:rgba(255,255,255,.45);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;flex-shrink:0
}
.sb-back:hover{border-color:#3CB878;color:#3CB878}
.sb-brand{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.sb-logo{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,#29ABE2,#3CB878);display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.sb-title{font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:800;color:#fff}
.sb-compose{
  width:28px;height:28px;border-radius:7px;
  border:1.5px solid rgba(255,255,255,.1);
  background:transparent;color:rgba(255,255,255,.45);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;flex-shrink:0
}
.sb-compose:hover{border-color:#29ABE2;color:#29ABE2;background:rgba(41,171,226,.08)}

/* Role toggle */
.sb-role{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.05)}
.role-pill{display:flex;background:rgba(255,255,255,.05);border-radius:7px;padding:2px;gap:2px}
.role-btn{flex:1;padding:5px 8px;border-radius:5px;border:none;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;background:transparent;color:rgba(255,255,255,.35);letter-spacing:.3px}
.role-btn.active{background:#fff;color:#0F2535;box-shadow:0 2px 6px rgba(0,0,0,.2)}

/* Search */
.sb-search{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04)}
.search-wrap{position:relative}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;color:rgba(255,255,255,.25)}
.search-input{
  width:100%;padding:7px 10px 7px 30px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
  border-radius:8px;color:#fff;font-size:13px;
  outline:none;transition:border-color .2s
}
.search-input::placeholder{color:rgba(255,255,255,.25)}
.search-input:focus{border-color:rgba(41,171,226,.4)}

/* Tab filters */
.sb-tabs{display:flex;gap:2px;padding:8px 12px 6px;border-bottom:1px solid rgba(255,255,255,.04)}
.sb-tab{padding:4px 10px;border-radius:20px;border:none;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:rgba(255,255,255,.3)}
.sb-tab.active{background:rgba(60,184,120,.15);color:#3CB878}

/* Conversation list */
.conv-list{flex:1;overflow-y:auto;padding:6px 0}
.conv-list::-webkit-scrollbar{width:4px}
.conv-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}
.conv-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;cursor:pointer;
  transition:background .15s;position:relative;
  border-left:2px solid transparent
}
.conv-item:hover{background:rgba(255,255,255,.04)}
.conv-item.active{background:rgba(41,171,226,.1);border-left-color:#29ABE2}
.conv-item.unread .conv-preview{color:rgba(255,255,255,.7)}
.conv-item.unread .conv-name{color:#fff;font-weight:700}
.conv-avatar{position:relative;flex-shrink:0}
.av{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;flex-shrink:0
}
.av-green{background:linear-gradient(135deg,#3CB878,#29ABE2)}
.av-blue{background:linear-gradient(135deg,#29ABE2,#1B3A4A)}
.av-orange{background:linear-gradient(135deg,#F5A623,#E84393)}
.av-purple{background:linear-gradient(135deg,#9B59B6,#29ABE2)}
.av-system{background:linear-gradient(135deg,#0F2535,#29ABE2);border:1.5px solid rgba(41,171,226,.3)}
.online-dot{position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;background:#3CB878;border:1.5px solid #0F2535}
.badge{
  position:absolute;top:-3px;right:-3px;
  min-width:16px;height:16px;border-radius:8px;
  background:#E84393;color:#fff;font-size:9px;font-weight:800;
  display:flex;align-items:center;justify-content:center;padding:0 4px;
  border:1.5px solid #0F2535
}
.conv-info{flex:1;min-width:0}
.conv-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.conv-name{font-size:13px;font-weight:600;color:rgba(255,255,255,.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-time{font-size:10px;color:rgba(255,255,255,.25);flex-shrink:0;margin-left:6px}
.conv-preview{font-size:11.5px;color:rgba(255,255,255,.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-tag{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;margin-left:4px}
.tag-order{background:rgba(245,166,35,.15);color:#F5A623}
.tag-system{background:rgba(41,171,226,.15);color:#29ABE2}

/* ── CENTER — CHAT AREA ── */
.chat-area{
  flex:1;display:flex;flex-direction:column;
  background:#F0F4F8;min-width:0;height:100%;
  position:relative;
}
.chat-empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  color:rgba(15,37,53,.35)
}
.chat-empty svg{opacity:.25}
.chat-empty p{font-size:14px}

/* Chat header */
.chat-header{
  background:#fff;border-bottom:1px solid #E8EDF2;
  padding:12px 18px;display:flex;align-items:center;gap:12px;
  flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.04)
}
.chat-hdr-av{flex-shrink:0}
.chat-hdr-info{flex:1;min-width:0}
.chat-hdr-name{font-size:14px;font-weight:700;color:#0F2535;display:flex;align-items:center;gap:6px}
.chat-hdr-sub{font-size:11.5px;color:#8A9AAA;margin-top:1px}
.online-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#3CB878;font-weight:600}
.online-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:#3CB878;display:inline-block}
.chat-hdr-actions{display:flex;align-items:center;gap:6px}
.hdr-btn{
  width:32px;height:32px;border-radius:8px;border:1.5px solid #E8EDF2;
  background:#fff;color:#8A9AAA;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s
}
.hdr-btn:hover{border-color:#29ABE2;color:#29ABE2;background:rgba(41,171,226,.05)}

/* Escrow banner (in chat header for order convs) */
.escrow-banner{
  background:linear-gradient(135deg,rgba(245,166,35,.08),rgba(60,184,120,.08));
  border-bottom:1px solid rgba(245,166,35,.2);
  padding:8px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0
}
.escrow-icon{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#F5A623,#E8A000);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.escrow-text{flex:1;min-width:0}
.escrow-label{font-size:11px;font-weight:700;color:#B37A00}
.escrow-status{font-size:12px;font-weight:600;color:#1B3A4A}
.escrow-amount{font-size:13px;font-weight:800;color:#3CB878;flex-shrink:0}
.escrow-actions{display:flex;gap:6px;margin-left:8px}
.escrow-btn{padding:5px 12px;border-radius:6px;border:none;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.escrow-btn-primary{background:#3CB878;color:#fff}
.escrow-btn-primary:hover{background:#2EA866}
.escrow-btn-secondary{background:rgba(245,166,35,.15);color:#B37A00;border:1px solid rgba(245,166,35,.3)}

/* Messages container */
.messages{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:6px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:4px}

/* Date divider */
.date-divider{text-align:center;margin:10px 0;position:relative}
.date-divider span{background:#F0F4F8;padding:0 10px;font-size:10px;font-weight:600;color:#8A9AAA;position:relative;z-index:1}
.date-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:#DDE3EB}

/* Message rows */
.msg-row{display:flex;align-items:flex-end;gap:8px;max-width:72%;position:relative}
.msg-row.sent{align-self:flex-end;flex-direction:row-reverse}
.msg-row.recv{align-self:flex-start}
.msg-row.system-row{align-self:center;max-width:80%}
.msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}

/* Bubble */
.bubble{
  padding:9px 13px;border-radius:14px;
  font-size:13.5px;line-height:1.5;
  position:relative;
  max-width:100%;word-break:break-word
}
.sent .bubble{
  background:#3CB878;color:#fff;
  border-bottom-right-radius:4px
}
.recv .bubble{
  background:#fff;color:#1B3A4A;
  border-bottom-left-radius:4px;
  box-shadow:0 1px 3px rgba(0,0,0,.07)
}
.bubble .reply-ref{
  background:rgba(0,0,0,.08);border-left:3px solid rgba(255,255,255,.5);
  border-radius:6px;padding:4px 8px;margin-bottom:6px;font-size:11px;opacity:.8
}
.recv .bubble .reply-ref{background:rgba(0,0,0,.05);border-left-color:#3CB878}

/* System message */
.system-bubble{
  background:rgba(15,37,53,.06);color:#4A6572;font-size:12px;
  padding:7px 14px;border-radius:20px;text-align:center;display:inline-block
}

/* Special: Oriupe Official */
.official-bubble{
  background:linear-gradient(135deg,#0F2535,#1B3A4A);
  color:#fff;border-radius:14px;padding:12px 16px;
  border-bottom-left-radius:4px;box-shadow:0 2px 8px rgba(15,37,53,.2)
}
.official-bubble .official-type{
  font-size:9px;font-weight:800;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px
}
.official-bubble .official-type.rappel{color:#29ABE2}
.official-bubble .official-type.alerte{color:#F5A623}
.official-bubble .official-type.validation{color:#3CB878}
.official-bubble .official-type.annonce{color:#E84393}
.official-bubble .official-body{font-size:13px;line-height:1.5}

/* Delivery card */
.delivery-card{
  background:#fff;border:1.5px solid #3CB878;border-radius:12px;
  padding:14px 16px;box-shadow:0 2px 10px rgba(60,184,120,.12)
}
.delivery-card .dc-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.delivery-card .dc-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#3CB878,#29ABE2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.delivery-card .dc-title{font-size:13px;font-weight:700;color:#0F2535}
.delivery-card .dc-sub{font-size:11px;color:#8A9AAA}
.delivery-card .dc-files{display:flex;flex-direction:column;gap:6px;margin:8px 0}
.delivery-card .dc-file{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#F4F6F9;border-radius:8px;font-size:12px;color:#1B3A4A;cursor:pointer}
.delivery-card .dc-actions{display:flex;gap:8px;margin-top:10px}
.delivery-card .dc-btn{flex:1;padding:8px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.delivery-card .dc-accept{background:#3CB878;color:#fff}
.delivery-card .dc-accept:hover{background:#2EA866}
.delivery-card .dc-revision{background:rgba(245,166,35,.12);color:#B37A00;border:1px solid rgba(245,166,35,.25)}

/* Reactions */
.reactions{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.reaction-chip{
  display:flex;align-items:center;gap:3px;
  padding:2px 6px;border-radius:10px;border:1px solid #DDE3EB;
  background:#fff;font-size:11px;cursor:pointer;transition:all .15s;
  color:#4A6572
}
.reaction-chip:hover,.reaction-chip.mine{background:rgba(60,184,120,.1);border-color:rgba(60,184,120,.3);color:#2EA866}
.sent .reaction-chip{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.8)}
.sent .reaction-chip:hover,.sent .reaction-chip.mine{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.5)}

/* Message meta */
.msg-meta{display:flex;align-items:center;gap:5px;margin-top:3px}
.msg-time{font-size:10px;color:#9AABB5}
.sent .msg-time{color:rgba(255,255,255,.6)}
.read-icon{display:flex;align-items:center}

/* Emoji picker row */
.emoji-row{
  position:absolute;bottom:calc(100% + 4px);
  background:#fff;border:1px solid #E8EDF2;border-radius:10px;
  padding:6px;display:flex;gap:3px;box-shadow:0 4px 16px rgba(0,0,0,.1);
  z-index:20;opacity:0;pointer-events:none;transition:opacity .15s
}
.msg-row:hover .emoji-row{opacity:1;pointer-events:auto}
.emoji-row.sent{right:0}
.emoji-row.recv{left:0}
.emo-btn{
  width:28px;height:28px;border-radius:6px;border:none;background:transparent;
  font-size:15px;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center
}
.emo-btn:hover{background:#F0F4F8}

/* Typing indicator */
.typing-row{display:flex;align-items:center;gap:8px;padding:0 0 6px;align-self:flex-start}
.typing-dots{display:flex;gap:3px;align-items:center;background:#fff;border-radius:14px;border-bottom-left-radius:4px;padding:9px 14px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:#C4D0D8;animation:tdot 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

/* Attachment preview strip */
.attach-strip{
  display:flex;flex-wrap:wrap;gap:6px;
  padding:8px 14px;background:#fff;
  border-top:1px solid #EDF0F3;flex-shrink:0
}
.attach-preview{
  display:flex;align-items:center;gap:6px;
  background:#F4F6F9;border-radius:8px;padding:5px 8px;
  font-size:11px;color:#4A6572;max-width:180px
}
.attach-preview-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.attach-rm{background:none;border:none;color:#8A9AAA;cursor:pointer;padding:0;line-height:1;display:flex}
.attach-rm:hover{color:#E84393}

/* Input area */
.input-wrap{
  background:#fff;border-top:1px solid #E8EDF2;
  padding:10px 14px;flex-shrink:0
}

/* Templates bar */
.templates-bar{
  display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;
}
.templates-bar::-webkit-scrollbar{display:none}
.tmpl-chip{
  white-space:nowrap;padding:5px 10px;border-radius:20px;
  border:1.5px solid #DDE3EB;background:#fff;
  font-size:11px;font-weight:600;color:#4A6572;
  cursor:pointer;transition:all .2s;flex-shrink:0
}
.tmpl-chip:hover{border-color:#3CB878;color:#3CB878;background:rgba(60,184,120,.05)}

/* Toolbar + composer */
.composer-row{display:flex;align-items:flex-end;gap:8px;margin-top:6px}
.composer{
  flex:1;display:flex;align-items:flex-end;gap:0;
  background:#F4F6F9;border:1.5px solid #E0E8EF;
  border-radius:12px;overflow:hidden;transition:border-color .2s
}
.composer:focus-within{border-color:#29ABE2}
.composer-actions{display:flex;align-items:center;padding:6px 8px 6px 10px;gap:2px}
.ca-btn{
  width:28px;height:28px;border:none;background:transparent;
  color:#8A9AAA;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:6px;transition:all .2s
}
.ca-btn:hover{background:#E8EDF2;color:#1B3A4A}
.composer textarea{
  flex:1;padding:9px 10px 9px 0;background:transparent;
  border:none;resize:none;outline:none;font-size:13.5px;
  color:#1B3A4A;line-height:1.5;max-height:120px;min-height:38px
}
.composer textarea::placeholder{color:#9AABB5}
.send-btn{
  width:38px;height:38px;border-radius:10px;border:none;
  background:#3CB878;color:#fff;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;flex-shrink:0
}
.send-btn:hover{background:#2EA866;transform:scale(1.04)}
.send-btn:disabled{background:#C4D0D8;cursor:not-allowed;transform:none}

/* ── RIGHT PANEL ── */
.right-panel{
  width:270px;flex-shrink:0;
  background:#fff;border-left:1px solid #E8EDF2;
  display:flex;flex-direction:column;
  height:100%;overflow:hidden;
  transition:transform .25s ease
}
.rp-head{
  padding:16px;border-bottom:1px solid #E8EDF2;
  text-align:center
}
.rp-big-av{
  width:56px;height:56px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;color:#fff;margin:0 auto 8px
}
.rp-name{font-size:14px;font-weight:700;color:#0F2535}
.rp-role{font-size:11px;color:#8A9AAA;margin-top:2px}
.rp-cta{margin-top:10px;display:flex;gap:6px;justify-content:center}
.rp-btn{padding:6px 14px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.rp-btn-green{background:#3CB878;color:#fff}
.rp-btn-green:hover{background:#2EA866}
.rp-btn-outline{background:transparent;border:1.5px solid #DDE3EB;color:#4A6572}
.rp-btn-outline:hover{border-color:#29ABE2;color:#29ABE2}

/* Right panel sections */
.rp-section{border-bottom:1px solid #EDF0F3;padding:14px 16px}
.rp-section-title{font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:#9AABB5;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.rp-section-title a{font-size:10px;font-weight:600;color:#29ABE2;text-transform:none;letter-spacing:0}

/* Escrow card in right panel */
.escrow-card{
  background:linear-gradient(135deg,#0F2535,#1B3A4A);
  border-radius:10px;padding:14px
}
.escrow-card .ec-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.escrow-card .ec-status{font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.escrow-card .ec-amount{font-size:22px;font-weight:800;color:#fff;margin-bottom:12px}
.escrow-card .ec-amount span{font-size:12px;color:rgba(255,255,255,.5);margin-left:4px}
.escrow-card .ec-line{display:flex;justify-content:space-between;margin-bottom:4px}
.escrow-card .ec-line .k{font-size:11px;color:rgba(255,255,255,.45)}
.escrow-card .ec-line .v{font-size:11px;color:rgba(255,255,255,.7);font-weight:600}
.escrow-card .ec-divider{height:1px;background:rgba(255,255,255,.06);margin:8px 0}
.escrow-card .ec-net{display:flex;justify-content:space-between;align-items:center}
.escrow-card .ec-net .k{font-size:11px;color:rgba(255,255,255,.45)}
.escrow-card .ec-net .v{font-size:14px;font-weight:800;color:#3CB878}
.status-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.sp-secured{background:rgba(60,184,120,.2);color:#3CB878}
.sp-progress{background:rgba(41,171,226,.2);color:#29ABE2}

// ── SÉCURITÉ : échappement HTML pour éviter XSS ────────────────────────────
function _esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;')
}

// ── SESSION ROLE DETECTION ─────────────────────────────────────────────────────
function getSessionRole() {
  try {
    const s = JSON.parse(localStorage.getItem('oriupe_session') || 'null')
    if (!s?.role) return 'client' // requireAuth() a déjà garanti une session valide
    return s.role
  } catch { return 'client' }
}

// ── INIT ───────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // 1. Auto-detect role from session
  const sessionRole = getSessionRole()
  if (sessionRole === 'client') {
    currentRole = 'client'
    const btnF = document.getElementById('roleFreelance')
    const btnC = document.getElementById('roleClient')
    if (btnF) btnF.classList.remove('active')
    if (btnC) btnC.classList.add('active')
  }

  renderConvList()

  // 2. Deep link via URL params: ?conv=conv_id OR ?order=ORD-xxxx
  const params = new URLSearchParams(window.location.search)
  const convParam  = params.get('conv')
  const orderParam = params.get('order')

  let targetConvId = null
  if (convParam && allConvs.find(c => c.id === convParam)) {
    targetConvId = convParam
  } else if (orderParam) {
    const match = allConvs.find(c => c.type === 'order' && c.orderId === orderParam)
    targetConvId = match?.id || null
  }

  // Fallback: for clients, default to first order conversation if no specific target
  if (!targetConvId && currentRole === 'client') {
    const firstOrder = allConvs.find(c => c.type === 'order')
    targetConvId = firstOrder?.id || allConvs[0]?.id
  }

  if (!targetConvId) targetConvId = allConvs[0]?.id
  if (targetConvId) openConv(targetConvId)
})

// ── CONVERSATION LIST ──────────────────────────────────────────────────────────
function renderConvList() {
  const list = document.getElementById('convList')
  let convs = allConvs.filter(c => {
    if (activeFilter === 'direct' && c.type !== 'direct') return false
    if (activeFilter === 'order' && c.type !== 'order') return false
    if (searchQuery) {
      const q = searchQuery.toLowerCase()
      return c.title.toLowerCase().includes(q) || (c.preview || '').toLowerCase().includes(q)
    }
    return true
  })

  list.innerHTML = convs.map(c => {
    const user = DEMO_USERS[c.with] || {}
    const isActive = c.id === currentConvId
    const hasUnread = c.unread > 0
    let tags = ''
    if (c.type === 'order') tags += `<span class="conv-tag tag-order">📦 Commande</span>`
    if (c.type === 'system') tags += `<span class="conv-tag tag-system">🔔 Officiel</span>`

    return `
      <div class="conv-item ${isActive ? 'active' : ''} ${hasUnread ? 'unread' : ''}"
           onclick="openConv('${c.id}')" id="ci_${c.id}">
        <div class="conv-avatar">
          <div class="av av-sm ${user.avClass || 'av-blue'}">${user.av || '?'}</div>
          ${c.online ? '<div class="online-dot"></div>' : ''}
          ${hasUnread ? `<div class="badge">${c.unread}</div>` : ''}
        </div>
        <div class="conv-info">
          <div class="conv-meta">
            <span class="conv-name">${c.title}${tags}</span>
            <span class="conv-time">${c.time}</span>
          </div>
          <div class="conv-preview">${c.preview || ''}</div>
        </div>
      </div>`
  }).join('')
}

// ── OPEN CONVERSATION ──────────────────────────────────────────────────────────
window.openConv = function(id, silent = false) {
  currentConvId = id
  currentConv = allConvs.find(c => c.id === id)
  if (!currentConv) return

  // Clear unread + sync badge nav
  const hadUnread = (currentConv.unread || 0) > 0
  currentConv.unread = 0
  if (hadUnread) {
    try {
      const _sess = JSON.parse(localStorage.getItem('oriupe_session') || 'null')
      if (_sess) {
        _sess.unreadMessages = Math.max(0, (_sess.unreadMessages || 0) - 1)
        localStorage.setItem('oriupe_session', JSON.stringify(_sess))
      }
    } catch {}
  }
  renderConvList()

  // Show chat
  document.getElementById('chatEmpty').classList.add('hidden')
  document.getElementById('chatContent').classList.remove('hidden')

  // Update header
  const user = DEMO_USERS[currentConv.with] || {}
  const av = document.getElementById('chatHdrAv')
  av.innerHTML = `<div class="av av-hdr ${user.avClass || 'av-blue'}">${user.av}</div>`
  document.getElementById('chatHdrName').textContent = currentConv.title
  const sub = document.getElementById('chatHdrSub')
  if (currentConv.online) {
    sub.innerHTML = `<span class="online-pill">En ligne</span>`
  } else if (currentConv.type === 'order') {
    sub.textContent = currentConv.order?.service || ''
  } else {
    sub.textContent = user.job || ''
  }

  // Escrow banner
  const banner = document.getElementById('escrowBanner')
  if (currentConv.type === 'order' && currentConv.order) {
    banner.classList.remove('hidden')
    document.getElementById('escrowStatusText').textContent = getOrderStatusText(currentConv.order.status)
    document.getElementById('escrowAmountText').textContent = fmt(currentConv.order.amount)
    renderEscrowBannerActions()
  } else {
    banner.classList.add('hidden')
  }

  // Templates
  renderTemplates()

  // Render messages
  renderMessages(id)

  // Right panel
  renderRightPanel()

  // Escrow action bar
  renderEscrowActionBar()

  // Unsubscribe old channel
  if (supaChannel && supabase) supabase.removeChannel(supaChannel)
  // Subscribe to realtime — utilise l'UUID Supabase si dispo, sinon l'ID local
  if (isSupabaseConfigured && supabase) {
    const realtimeId = currentConv?.supabaseConvId || id
    supaChannel = subscribeToConversation(realtimeId, handleRealtimeMsg)
  }
}

function getOrderStatusText(status) {
  return {
    AWAITING_PAYMENT: 'En attente de paiement',
    FUNDS_SECURED: 'Fonds sécurisés — commande confirmée',
    IN_PROGRESS: 'En cours — livraison attendue',
    DELIVERED: 'Livré — en attente de validation',
    VALIDATED: 'Validé par le client',
    COMPLETED: 'Commande terminée',
    DISPUTED: 'Litige ouvert'
  }[status] || status
}

function renderEscrowBannerActions() {
  const el = document.getElementById('escrowBannerActions')
  if (!currentConv?.order) return el.innerHTML = ''
  const { status } = currentConv.order
  const isClient = currentRole === 'client'
  const isFreelance = currentRole === 'freelance'
  if (status === 'IN_PROGRESS' && isFreelance) {
    el.innerHTML = `<button class="escrow-btn escrow-btn-primary" onclick="sendDelivery()">📦 Livrer</button>`
  } else if (status === 'DELIVERED' && isClient) {
    el.innerHTML = `
      <button class="escrow-btn escrow-btn-primary" onclick="validateDelivery()">✅ Valider</button>
      <button class="escrow-btn escrow-btn-secondary" onclick="requestRevision()">🔄 Révision</button>`
  } else {
    el.innerHTML = ''
  }
}

function renderMessages(convId) {
  const container = document.getElementById('messages')
  const msgs = DEMO_MSGS[convId] || []
  container.innerHTML = ''

  let lastDate = null
  msgs.forEach(m => {
    const dateStr = m.time?.split(' ')[0] || 'Aujourd\'hui'
    if (dateStr !== lastDate) {
      const div = document.createElement('div')
      div.className = 'date-divider'
      div.innerHTML = `<span>${dateStr.match(/^\d/) ? 'Aujourd\'hui' : dateStr}</span>`
      container.appendChild(div)
      lastDate = dateStr
    }
    container.appendChild(createMsgEl(m))
  })

  scrollToBottom()
}

  const isSys = m.sender === 'sys' || m.type === 'escrow'

  if (isSys) return createSysMsg(m)
  if (m.type === 'delivery') return createDeliveryCard(m, isSent)

  const senderUser = Object.values(DEMO_USERS).find(u => u.id === m.sender || (m.sender === 'kofi' && u.id === 'usr_kofi_001') || (m.sender === 'awa' && u.id === 'usr_awa_002') || (m.sender === 'ada' && u.id === 'usr_ada_003') || (m.sender === 'sam' && u.id === 'usr_sam_004'))

  const div = document.createElement('div')
  div.className = `msg-row ${isSent ? 'sent' : 'recv'}`
  div.dataset.msgId = m.id

  const reactionHtml = renderReactions(m.reactions || {}, isSent)
  const readHtml = isSent ? `<div class="read-icon">${m.read ? readDoubleCheck('#3CB878') : readDoubleCheck('#C4D0D8')}</div>` : ''

  let bodyHtml = ''

  const isClient = currentRole === 'client'
  const isFreelance = currentRole === 'freelance'

  const META = {
    AWAITING_PAYMENT: { iconClass: 'eic-icon-await',    title: 'Paiement requis',       sub: 'En attente du règlement client' },
    FUNDS_SECURED:    { iconClass: 'eic-icon-secure',   title: 'Paiement sécurisé',     sub: 'Fonds verrouillés par Oriupe Escrow' },
    IN_PROGRESS:      { iconClass: 'eic-icon-progress', title: 'Commande en cours',     sub: 'Travaux démarrés par le prestataire' },
    DELIVERED:        { iconClass: 'eic-icon-deliver',  title: 'Livraison disponible',  sub: 'En attente de validation client' },
    VALIDATED:        { iconClass: 'eic-icon-done',     title: 'Livraison validée',     sub: 'Paiement en cours de virement' },
    COMPLETED:        { iconClass: 'eic-icon-done',     title: 'Commande clôturée',     sub: 'Virement effectué avec succès' },
    DISPUTED:         { iconClass: 'eic-icon-dispute',  title: 'Litige ouvert',         sub: 'Un administrateur va intervenir' },
  }
  const meta = META[e.status] || META.AWAITING_PAYMENT

  let btnsHtml = ''
  if (e.isActive) {
    if (e.status === 'AWAITING_PAYMENT' && isClient)
      btnsHtml = `<div class="eic-btns"><button type="button" class="eic-btn eic-btn-pay" onclick="initiatePayment()">💳 Payer ${fmt(e.amount)} FCFA maintenant</button></div>`
    else if (e.status === 'FUNDS_SECURED' && isFreelance)
      btnsHtml = `<div class="eic-btns"><button type="button" class="eic-btn eic-btn-ok" onclick="startWork()">🚀 Démarrer les travaux</button></div>`
    else if (e.status === 'IN_PROGRESS' && isFreelance)
      btnsHtml = `<div class="eic-btns"><button type="button" class="eic-btn eic-btn-ok" onclick="sendDelivery()">📦 Livrer la commande</button></div>`
    else if (e.status === 'DELIVERED' && isClient)
      btnsHtml = `<div class="eic-btns"><button type="button" class="eic-btn eic-btn-ok" onclick="validateDelivery()">✅ Valider & Libérer les fonds</button><button type="button" class="eic-btn eic-btn-rev" onclick="requestRevision()">🔄 Révision</button></div>`
    else if (e.status === 'DELIVERED' && isFreelance)
      btnsHtml = `<div class="eic-footer">⏳ En attente de validation client</div>`
    else if (['COMPLETED','VALIDATED'].includes(e.status))
      btnsHtml = `<div class="eic-footer">✅ Commande terminée — ${fmt(e.net)} FCFA reversés</div>`
    else if (e.status === 'IN_PROGRESS' && isClient)
      btnsHtml = `<div class="eic-footer">⚙️ Prestataire en cours de travail — échéance ${e.deadline}</div>`
  } else {
    const doneStatuses = ['FUNDS_SECURED','IN_PROGRESS','DELIVERED','VALIDATED','COMPLETED']
    if (doneStatuses.includes(e.status))
      btnsHtml = `<div class="eic-footer">✓ Étape complétée</div>`
  }

  div.innerHTML = `
    <div>
      <div class="escrow-inline-card">
        <div class="eic-hdr">
          <div class="eic-icon ${meta.iconClass}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>

            <div class="eic-sub">${meta.sub}</div>
          </div>

        </div>
        <div class="eic-service">${e.service}</div>
        <div class="eic-rows">

          <div class="eic-sep"></div>
          <div class="eic-net-row"><span class="k">Reversement net prestataire</span><span class="v">${fmt(e.net)} FCFA</span></div>

    const mine = users.includes(me.id)
    return `<span class="reaction-chip ${mine ? 'mine' : ''}" onclick="reactTo('',  '${emoji}')">${emoji} ${users.length}</span>`

  return `<div class="reactions">${chips}</div>`

// ── SEND MESSAGE ───────────────────────────────────────────────────────────────
window.sendMessage = async function() {
  const input = document.getElementById('msgInput')
  const body = input.value.trim()
  if (!body && !pendingFiles.length) return

  input.value = ''
  autoResize(input)

  const me = ME()
  const now = new Date()
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`

  const newMsg = {
    id: 'msg_' + Date.now(),
    sender: currentRole === 'freelance' ? 'kofi' : 'awa',
    body,
    time: timeStr,
    reactions: {},
    read: false
  }

  if (!DEMO_MSGS[currentConvId]) DEMO_MSGS[currentConvId] = []
  DEMO_MSGS[currentConvId].push(newMsg)

  const conv = allConvs.find(c => c.id === currentConvId)
  if (conv) {
    conv.preview = body.slice(0, 50)
    conv.time = timeStr
    renderConvList()
  }

  const container = document.getElementById('messages')
  container.appendChild(createMsgEl(newMsg))
  scrollToBottom()

  clearPendingFiles()

  // Supabase save — utilise l'UUID réel si disponible
  const sbConvId = currentConv?.supabaseConvId
  if (isSupabaseConfigured && supabase && sbConvId) {
    try {
      await sendDirectMessage(sbConvId, body, { type: 'text' })
    } catch (e) {
      console.warn('[Oriupe] sendDirectMessage error:', e)
    }
  }

  // Simulate reply for demo
  if (currentConv?.type !== 'order' && currentConv?.type !== 'system') {
    simulateReply()
  }
}

function simulateReply() {
  const conv = currentConv
  if (!conv) return
  const user = DEMO_USERS[conv.with]
  if (!user || user.role === 'system') return

  // Show typing
  const typRow = document.getElementById('typingRow')
  const typAv = document.getElementById('typingAv')
  typAv.textContent = user.av
  typAv.className = `msg-av ${user.avClass}`
  typRow.classList.remove('hidden')
  scrollToBottom()

  const REPLIES = {
    awa:  ['Merci pour l\'info !', 'Super, je regarde ça 👍', 'Ok, on fait comme ça alors !', 'Vous pouvez envoyer plus de détails ?'],
    ada:  ['Great! Looking forward to it.', 'Perfect, thank you!', 'That works for me 👌', 'Send me the proposal when ready.'],
    sam:  ['Très bien, merci !', 'D\'accord, je valide.', 'Parfait !', 'On se parle demain ?']
  }
  const replies = REPLIES[conv.with] || ['👍']
  const reply = replies[Math.floor(Math.random() * replies.length)]

  setTimeout(() => {
    typRow.classList.add('hidden')
    const now = new Date()
    const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`
    const m = { id: 'auto_'+Date.now(), sender: conv.with, body: reply, time: timeStr, reactions: {} }
    DEMO_MSGS[currentConvId].push(m)
    document.getElementById('messages').appendChild(createMsgEl(m))
    scrollToBottom()
    conv.preview = reply
    conv.time = timeStr
    renderConvList()
  }, 1200 + Math.random() * 1200)
}

window.handleFiles = function(files) {
  Array.from(files).forEach(f => pendingFiles.push(f))
  renderAttachStrip()
}

function renderAttachStrip() {
  const strip = document.getElementById('attachStrip')
  if (!pendingFiles.length) { strip.classList.add('hidden'); return }
  strip.classList.remove('hidden')
  strip.innerHTML = pendingFiles.map((f, i) => `
    <div class="attach-preview">
      <span class="attach-icon">${fileIcon(f.name)}</span>
      <span class="attach-preview-name">${f.name}</span>
      <button type="button" class="attach-rm" onclick="removeFile(${i})" aria-label="Retirer le fichier">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`).join('')
}

window.removeFile = function(i) {
  pendingFiles.splice(i, 1)
  renderAttachStrip()
}

function clearPendingFiles() {
  pendingFiles = []
  renderAttachStrip()
}

function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase()
  return { pdf: '📄', zip: '🗜️', png: '🖼️', jpg: '🖼️', jpeg: '🖼️', gif: '🖼️', mp4: '🎥', mp3: '🎵', doc: '📝', docx: '📝', xls: '📊', xlsx: '📊' }[ext] || '📎'
}

function _pmSelect(el) {
  document.querySelectorAll('#pm-modal .pm-opt').forEach(o => o.classList.remove('sel'))
  el.classList.add('sel')
  const op = el.dataset.op
  const lbl = document.getElementById('pm-phone-lbl')
  const inp = document.getElementById('pm-phone')
  if (op === 'card') {
    if (lbl) lbl.textContent = 'Numéro de carte'
    if (inp) inp.placeholder = '4242 4242 4242 4242'
  } else {
    if (lbl) lbl.textContent = 'Numéro Mobile Money'
    const placeholders = { orange: '+225 07 XX XX XX XX', mtn: '+233 24 XXX XXXX', wave: '+221 77 XXX XX XX' }
    if (inp) inp.placeholder = placeholders[op] || '+XXX XX XX XX XX'
  }
}

function _pmConfirm() {
  const phone = document.getElementById('pm-phone')?.value?.trim()
  if (!phone || phone.replace(/\D/g,'').length < 8) {
    const inp = document.getElementById('pm-phone')
    if (inp) { inp.classList.add('error'); inp.focus() }
    return
  }
  // Capture pour _pmFinalize
  const opMap = { orange:'ORANGE_MONEY', mtn:'MTN_MOMO', wave:'WAVE', card:'VISA' }
  const selOp = document.querySelector('#pm-modal .pm-opt.sel')?.dataset?.op || 'orange'
  _pendingPayOp = opMap[selOp] || 'ORANGE_MONEY'
  _pendingPayPhone = phone

  const btn = document.getElementById('pm-cta-btn')
  if (btn) btn.disabled = true

  document.getElementById('pm-step-1').style.display = 'none'
  document.getElementById('pm-step-2').style.display = 'block'

  const steps = ['Connexion à l\'opérateur…', 'Vérification du numéro…', 'Sécurisation des fonds…', 'Confirmation Oriupe Escrow…']
  let i = 0
  const iv = setInterval(() => {
    const txt = document.getElementById('pm-loading-txt')
    if (txt && steps[i]) txt.textContent = steps[i++]
    if (i >= steps.length) {
      clearInterval(iv)
      setTimeout(() => {
        const modal = document.getElementById('pm-modal')
        if (modal) modal.remove()
        _pmFinalize()
      }, 600)
    }
  }, 600)
}

function _pmFinalize() {
  if (!currentConv?.order) return
  currentConv.order.status = 'FUNDS_SECURED'
  const t = _timeNow()
  _addMsg({ id: 'sys_pay_'+Date.now(), type: 'escrow', sender: 'sys', body: `💳 Paiement de ${fmt(currentConv.order.amount)} FCFA confirmé et sécurisé par Oriupe Escrow.`, time: t })
  _addMsg({ id: 'esc_pay_'+Date.now(), type: 'escrow_card', sender: 'sys', time: t,
    escrow: { ...currentConv.order, status: 'FUNDS_SECURED', isActive: true } })
  scrollToBottom()
  _refreshAll()
  showToast('🔐 Paiement sécurisé !')

  // Persist en Supabase (best-effort, non-bloquant)
  if (supabase) {
    _persistOrderToSupabase(currentConv.order, _pendingPayOp, _pendingPayPhone).catch(() => {})
  }
}

async function _persistOrderToSupabase(order, payMethod, payPhone) {
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) return

  // UUID freelance demo connu
  const FREELANCE_UUID = 'b2c3d4e5-0002-0002-0002-000000000002'

  // Récupère un service actif du freelance (pour respecter la FK)
  const { data: svcRows } = await supabase
    .from('services')
    .select('id')
    .eq('freelance_id', FREELANCE_UUID)
    .eq('status', 'active')
    .limit(1)
  const serviceId = svcRows?.[0]?.id
  if (!serviceId) return

  // Deadline : on prend toujours +7j depuis maintenant (la valeur locale FR ne parse pas en ISO)
  const deadlineDate = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000)

  // Crée l'order
  const { data: sbOrder, error: oErr } = await supabase
    .from('orders')
    .insert({
      client_id:      user.id,
      freelance_id:   FREELANCE_UUID,
      service_id:     serviceId,
      amount_total:   order.amount,
      commission_rate: 0.12,
      status:         'FUNDS_SECURED',
      payment_method: payMethod,
      payment_phone:  payPhone,
      paid_at:        new Date().toISOString(),
      deadline:       deadlineDate.toISOString(),
    })
    .select('id, escrow_code')
    .single()

  if (oErr) { console.warn('[Oriupe] Supabase order insert:', oErr.message); return }

  // Stocke l'ID Supabase dans le conv localStorage pour l'escrow page + Realtime
  currentConv.supabaseOrderId = sbOrder.id
  try {
    const convs = JSON.parse(localStorage.getItem('oriupe_pending_convs') || '[]')
    const idx = convs.findIndex(c => c.id === currentConv.id)
    if (idx !== -1) { convs[idx].supabaseOrderId = sbOrder.id; localStorage.setItem('oriupe_pending_convs', JSON.stringify(convs)) }
  } catch {}

  // Crée la conversation Supabase liée à l'order
  const { data: sbConv, error: cErr } = await supabase
    .from('conversations')
    .insert({
      type:         'order',
      order_id:     sbOrder.id,
      participants: [user.id, FREELANCE_UUID],
      title:        order.service || 'Commande Oriupe',
      unread_counts: { [user.id]: 0, [FREELANCE_UUID]: 0 },
    })
    .select('id')
    .single()

  if (cErr) { console.warn('[Oriupe] Supabase conv insert:', cErr.message); return }

  // Stocke l'UUID Supabase du conv pour la souscription Realtime
  currentConv.supabaseConvId = sbConv.id
  try {
    const convs = JSON.parse(localStorage.getItem('oriupe_pending_convs') || '[]')
    const idx = convs.findIndex(c => c.id === currentConv.id)
    if (idx !== -1) { convs[idx].supabaseConvId = sbConv.id; localStorage.setItem('oriupe_pending_convs', JSON.stringify(convs)) }
  } catch {}

  // Resouscrit avec l'UUID Supabase pour le Realtime
  if (supaChannel) supabase.removeChannel(supaChannel)
  supaChannel = subscribeToConversation(sbConv.id, handleRealtimeMsg)

  // Message système initial
  await supabase.from('messages').insert({
    conversation_id: sbConv.id,
    sender_id:       user.id,
    type:            'escrow',
    body:            `🔐 Paiement de ${order.amount.toLocaleString('fr-FR')} FCFA sécurisé. Commande ${order.ref || ''} démarrée.`,
    metadata:        { escrow_status: 'FUNDS_SECURED', order_id: sbOrder.id },
  })
}

// ── REALTIME ───────────────────────────────────────────────────────────────────
function handleRealtimeMsg(event) {
  if (event.type === 'new_message') {
    const m = event.message
    const me = ME()
    if (m.sender_id === me.id) return
    const adapted = {
      id: m.id, sender: m.sender_id, body: m.body,
      type: m.type, time: new Date(m.created_at).toLocaleTimeString('fr',{hour:'2-digit',minute:'2-digit'}),
      reactions: m.reactions || {}
    }
    if (!DEMO_MSGS[currentConvId]) DEMO_MSGS[currentConvId] = []
    DEMO_MSGS[currentConvId].push(adapted)
    document.getElementById('messages').appendChild(createMsgEl(adapted))
    scrollToBottom()
  }
}

// ── REACTIONS ──────────────────────────────────────────────────────────────────
window.reactTo = function(msgId, emoji) {
  const me = ME()
  const msgs = DEMO_MSGS[currentConvId] || []
  const msg = msgs.find(m => m.id === msgId)
  if (!msg) return
  if (!msg.reactions) msg.reactions = {}
  if (!msg.reactions[emoji]) msg.reactions[emoji] = []
  const idx = msg.reactions[emoji].indexOf(me.id)
  if (idx >= 0) msg.reactions[emoji].splice(idx, 1)
  else msg.reactions[emoji].push(me.id)
  if (!msg.reactions[emoji].length) delete msg.reactions[emoji]
  // Re-render just this message
  const el = document.querySelector(`[data-msg-id="${msgId}"]`)
  if (el) {
    const isSent = el.classList.contains('sent')
    const newEl = createMsgEl(msg)
    el.replaceWith(newEl)
  }
}

          <div class="ec-line"><span class="k">Commission (12%)</span><span class="v">-${fmt(o.commission)} FCFA</span></div>
          <div class="ec-divider"></div>
          <div class="ec-net"><span class="k">Reversement net</span><span class="v">${fmt(o.net)} FCFA</span></div>
          <div style="margin-top:6px"><div class="ec-line"><span class="k">Échéance</span><span class="v">${o.deadline}</span></div></div>
          ${actions}
        </div>
      </div>`
  }

  // DM avec un freelance ayant une commande active → lien vers l'ordre
  let activeOrderLink = ''
  if (currentConv.type === 'direct') {
    const linkedOrder = allConvs.find(c =>
      c.type === 'order' && c.with === currentConv.with && c.order &&
      !['COMPLETED','CANCELLED','REFUNDED'].includes(c.order?.status)
    )
    if (linkedOrder) {
      const o = linkedOrder.order
      const [spClass, spLabel] = STATUSES[o.status] || ['sp-await', o.status]
      const actionHint = currentRole === 'client' && o.status === 'DELIVERED'
        ? `<div style="font-size:11px;color:#3CB878;font-weight:700;margin-top:6px">⚡ Livraison disponible — validation requise</div>`
        : currentRole === 'client' && o.status === 'IN_PROGRESS'
        ? `<div style="font-size:11px;color:rgba(255,255,255,.45);margin-top:4px">Livraison attendue avant le ${o.deadline}</div>`
        : ''
      activeOrderLink = `
        <div class="rp-section">
          <div class="rp-section-title">Commande active</div>
          <div style="background:linear-gradient(135deg,#0F2535,#1B3A4A);border-radius:10px;padding:12px;cursor:pointer" onclick="openConv('${linkedOrder.id}')">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <span class="status-pill ${spClass}">${spLabel}</span>
              <span style="font-size:10px;color:rgba(255,255,255,.35)">${linkedOrder.title}</span>
            </div>
            <div style="font-size:20px;font-weight:800;color:#fff;margin-bottom:4px">${fmt(o.amount)} <span style="font-size:11px;color:rgba(255,255,255,.4)">FCFA</span></div>
            <div style="font-size:11px;color:rgba(255,255,255,.45)">${o.service}</div>
            ${actionHint}
            <div style="margin-top:10px;text-align:center;font-size:11px;font-weight:700;color:#29ABE2;padding:6px;background:rgba(41,171,226,.1);border-radius:6px">
              Voir le fil commande →
            </div>
          </div>
        </div>`
    }
  }

  const sharedFiles = (DEMO_MSGS[currentConv.id] || []).filter(m => m.attachment || m.type === 'file')
  const filesSection = sharedFiles.length ? `
    <div class="rp-section">
      <div class="rp-section-title">Fichiers partagés <a href="#">Voir tout</a></div>
      ${sharedFiles.slice(0, 4).map(m => `
        <div class="shared-file">
          <div class="sf-icon">${(m.attachment || {}).icon || '📎'}</div>
          <div class="sf-info">
            <div class="sf-name">${(m.attachment || {}).name || m.body}</div>
            <div class="sf-size">${(m.attachment || {}).size || ''}</div>
          </div>
        </div>`).join('')}
    </div>` : ''

  const statsSection = user.rating ? `
    <div class="rp-section">
      <div class="rp-section-title">Statistiques</div>
      <div class="mini-stats">
        <div class="mini-stat"><div class="ms-val">⭐ ${user.rating}</div><div class="ms-lab">Note</div></div>
        <div class="mini-stat"><div class="ms-val">47</div><div class="ms-lab">Commandes</div></div>
        <div class="mini-stat"><div class="ms-val">98%</div><div class="ms-lab">Satisfaction</div></div>
        <div class="mini-stat"><div class="ms-val">2j</div><div class="ms-lab">Délai moy.</div></div>
      </div>
    </div>` : ''

  rp.innerHTML = `
    <div class="rp-head">
      <div class="rp-big-av ${user.avClass || 'av-blue'}">${user.av || '?'}</div>
      <div class="rp-name">${user.name || currentConv.title}</div>
      <div class="rp-role">${user.job || ''}</div>
      ${user.role !== 'system' ? `
      <div class="rp-cta">
        <button type="button" class="rp-btn rp-btn-green" onclick="showToast('Commande en cours...')">Commander</button>
        <button type="button" class="rp-btn rp-btn-outline" onclick="window.open('/src/pages/profile/index.html')">Profil</button>
      </div>` : ''}
    </div>
    ${activeOrderLink}
    ${orderSection}
    ${filesSection}
    ${statsSection}`
}

window.toggleRightPanel = function() {
  document.getElementById('rightPanel').classList.toggle('hidden')
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
function fmt(n) { return new Intl.NumberFormat('fr-FR').format(n).replace(/ /g, ' ') }

window.autoResize = function(el) {
  el.style.height = 'auto'
  el.style.height = Math.min(el.scrollHeight, 120) + 'px'
}

window.handleKey = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    sendMessage()
  }
}

window.openNewConv = function() {
  showToast('Nouveau message — bientôt disponible')
}

window.closeChatMobile = function() {
  document.getElementById('sidebar').classList.add('mobile-open')
}

function showToast(msg, type = 'info') {
  if (window.toast) { window.toast(msg, type); return }
  const t = document.getElementById('toast')
  if (!t) return
  t.textContent = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2800)
}
window.showToast = showToast

// expose for nav
window.filterConvs = window.filterConvs
</script>
<script type="module">
  import { toast } from '/src/shared/toast.js'
  window.toast = toast
  window.showToast = (msg, type = 'info') => toast(msg, type)
</script>
</body>
</html>
