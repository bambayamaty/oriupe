# Supabase local config — https://supabase.com/docs/guides/local-development
# Ajustez project_id avec l'ID de votre projet Supabase Dashboard

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true
ip_version = "IPv4"

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.contracts]
public = false
file_size_limit = "5MiB"
allowed_mime_types = ["text/html", "application/pdf"]

[storage.buckets.message-attachments]
public = false
file_size_limit = "20MiB"

[storage.buckets.kyc-documents]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp", "application/pdf"]

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://localhost:5173", "https://oriupe.com"]
jwt_expiry = 86400
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.sms]
enable_signup = false

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

# ── Edge Functions ────────────────────────────────────────────────────────────

[functions.cinetpay-webhook]
enabled = true
verify_jwt = false   # Webhook CinetPay — vérifié par HMAC interne

[functions.liberation-paiement-escrow]
enabled = true
verify_jwt = false   # Appelé en interne avec service_role

[functions.confirmation-virement]
enabled = true
verify_jwt = false   # Webhook CinetPay — vérifié par HMAC interne

[functions.validation-automatique-escrow]
enabled = true
verify_jwt = false   # Cron job — auth via service_role header

[functions.traitement-decision-kyc]
enabled = true
verify_jwt = true    # Requiert JWT admin

[functions.calcul-progression-escrow]
enabled = true
verify_jwt = true    # Requiert JWT utilisateur

[functions.montee-niveau-freelance]
enabled = true
verify_jwt = false   # Appelé en interne après complétion d'ordre

[functions.generation-contrat-pdf]
enabled = true
verify_jwt = true    # Requiert JWT utilisateur

[functions.envoi-notifications-ciblees]
enabled = true
verify_jwt = false   # Appelé en interne avec service_role
